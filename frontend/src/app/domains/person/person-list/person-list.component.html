<div class="table-wrap">
  <table mat-table [dataSource]="dataSource" matSort>

    <!-- Name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let p">{{ p.name }}</td>
      <td mat-footer-cell *matFooterCellDef></td>
    </ng-container>

    <!-- Vorname -->
    <ng-container matColumnDef="vorname">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Vorname</th>
      <td mat-cell *matCellDef="let p">{{ p.vorname }}</td>
      <td mat-footer-cell *matFooterCellDef></td>
    </ng-container>

    <!-- Geburtsdatum -->
    <ng-container matColumnDef="geburtsdatum">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Geburtsdatum</th>
      <td mat-cell *matCellDef="let p">{{ p.geburtsdatum | date:'dd.MM.yyyy' }}</td>
      <td mat-footer-cell *matFooterCellDef></td>
    </ng-container>

    <!-- AHV-Nummer -->
    <ng-container matColumnDef="ahvnummer">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>AHV-Nummer</th>
      <td mat-cell *matCellDef="let p">{{ p.ahvnummer }}</td>
      <td mat-footer-cell *matFooterCellDef></td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row class="person-row" (click)="selectRow(row.id)" *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,25,50]" showFirstLastButtons></mat-paginator>
</div>
